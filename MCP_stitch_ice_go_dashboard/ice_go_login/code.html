<h1 class="font-headline-md text-headline-md text-on-surface">Iniciar Sesión</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Panel de administración</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Correo electrónico</label>
<div class="relative">
<input class="w-full h-9 bg-surface-container-low border border-transparent rounded-md px-sm py-xs text-on-surface font-body-md focus:bg-surface-container-lowest focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors placeholder:text-outline-variant" id="email" name="email" placeholder="admin@ice-go.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
<div class="relative flex items-center">
<input class="w-full h-9 bg-surface-container-low border border-transparent rounded-md pl-sm pr-[36px] py-xs text-on-surface font-body-md focus:bg-surface-container-lowest focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-colors placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-xs p-xs text-on-surface-variant hover:text-on-surface rounded-md focus:outline-none flex items-center justify-center h-8 w-8 transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[18px]" id="visibility-icon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-9 mt-sm bg-primary-container hover:bg-primary text-on-primary font-label-md text-label-md rounded-md transition-colors flex items-center justify-center" type="submit">
                Iniciar sesión
            </button>
</form>
<!-- Footer -->
<div class="text-center mt-sm">
<p class="font-label-md text-label-md text-outline">Acceso exclusivo para administradores</p>
</div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility';
            }
        }
    </script>
</body></html>
